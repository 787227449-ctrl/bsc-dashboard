<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>浦西团队 六月必上菜考核</title>
<style>
:root{
  --primary:#1565C0;--primary-light:#E3F2FD;--primary-dark:#0D47A1;
  --success:#2E7D32;--success-bg:#E8F5E9;
  --warning:#F57F17;--warning-bg:#FFFDE7;
  --danger:#E53935;--danger-bg:#FFEBEE;
  --gray:#757575;--border:#E0E0E0;--bg:#F5F5F5;--card:#FFFFFF;
  --radius:12px;--nav-h:60px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--bg);color:#212121;line-height:1.5;font-size:14px;min-height:100vh;padding-bottom:var(--nav-h)}
.top-header{background:var(--primary);color:#fff;padding:14px 16px 10px;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.top-header h1{font-size:17px;font-weight:700;letter-spacing:.5px}
.top-header .sub{font-size:12px;opacity:.85;margin-top:3px;display:flex;gap:12px;align-items:center}
.exam-day-badge{background:rgba(255,255,255,.2);border-radius:20px;padding:2px 10px;font-size:12px;font-weight:600}
.desktop-tabs{display:none;background:#0D47A1;border-bottom:1px solid rgba(255,255,255,.15)}
.desktop-tabs .dtab-list{display:flex;max-width:900px;margin:0 auto}
.desktop-tabs .dtab-item{padding:10px 28px;color:rgba(255,255,255,.75);cursor:pointer;font-size:14px;font-weight:500;border-bottom:3px solid transparent;transition:all .2s;user-select:none}
.desktop-tabs .dtab-item.active{color:#fff;border-bottom-color:#64B5F6}
.bottom-nav{display:flex;position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:#fff;border-top:1px solid var(--border);z-index:200;box-shadow:0 -2px 8px rgba(0,0,0,.08)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--gray);transition:color .15s;font-size:11px;font-weight:500;user-select:none}
.nav-item.active{color:var(--primary)}
.nav-icon{font-size:22px;line-height:1}
.page{display:none;max-width:900px;margin:0 auto;padding:12px 12px 16px}
.page.active{display:block}
.card{background:var(--card);border-radius:var(--radius);box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:12px;overflow:hidden}
.card-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.card-header h2{font-size:14px;font-weight:700;flex:1;color:#333}
.card-body{padding:14px 16px}
/* Overview */
.overview-card{background:linear-gradient(135deg,#1565C0 0%,#1976D2 100%);border-radius:var(--radius);padding:20px 16px;margin-bottom:12px;color:#fff;box-shadow:0 4px 12px rgba(21,101,192,.3)}
.overview-title{font-size:13px;opacity:.9;margin-bottom:12px;font-weight:500}
.overview-main{display:flex;align-items:center;gap:20px}
.circle-wrap{position:relative;width:120px;height:120px;flex-shrink:0}
.circle-wrap canvas{position:absolute;top:0;left:0}
.circle-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.circle-pct{font-size:24px;font-weight:800;line-height:1}
.circle-sub{font-size:11px;opacity:.85;margin-top:2px}
.overview-stats{flex:1;display:flex;flex-direction:column;gap:10px}
.stat-row{display:flex;justify-content:space-between;align-items:center}
.stat-label{font-size:12px;opacity:.85}
.stat-value{font-size:18px;font-weight:700}
.stat-value.small{font-size:14px}
.stat-delta{font-size:12px;font-weight:600;padding:2px 8px;border-radius:10px;background:rgba(255,255,255,.2)}
.stat-delta.pos{background:rgba(46,125,50,.3)}
.stat-delta.neg{background:rgba(229,57,53,.3)}
/* Group bars */
.group-list{display:flex;flex-direction:column;gap:10px}
.group-item{display:flex;flex-direction:column;gap:4px}
.group-item-hdr{display:flex;justify-content:space-between;align-items:center}
.group-name{font-size:13px;font-weight:600;color:#333}
.group-stats-txt{font-size:12px;color:var(--gray)}
.group-bar-wrap{height:8px;background:#F0F0F0;border-radius:4px;overflow:hidden}
.group-bar-fill{height:100%;border-radius:4px;transition:width .6s}
/* Goal */
.goal-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)}
.goal-row:last-child{border-bottom:none;padding-bottom:0}
.gl{font-size:13px;color:var(--gray)}
.gv{font-size:15px;font-weight:700;color:#333}
.goal-gap-box{background:var(--danger-bg);border-radius:8px;padding:10px 14px;margin-top:10px;text-align:center}
.gap-num{font-size:28px;font-weight:800;color:var(--danger);line-height:1}
.gap-label{font-size:12px;color:var(--gray);margin-top:4px}
/* Trend chart */
.trend-toggle{display:flex;gap:0;background:#F5F5F5;border-radius:8px;padding:3px;width:fit-content}
.ttab{padding:5px 16px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;color:var(--gray);transition:all .15s;user-select:none}
.ttab.active{background:#fff;color:var(--primary);box-shadow:0 1px 4px rgba(0,0,0,.12)}
.chart-canvas-wrap{margin-top:10px;position:relative}
/* Board */
.board-toggle{display:flex;gap:0;background:#F5F5F5;border-radius:8px;padding:3px;width:fit-content;margin-bottom:12px}
.btab{padding:6px 20px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;color:var(--gray);transition:all .15s;user-select:none}
.btab.active{background:#fff;color:var(--primary);box-shadow:0 1px 4px rgba(0,0,0,.12)}
.group-section{margin-bottom:10px;border-radius:var(--radius);overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);background:#fff}
.gs-header{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #f0f0f0}
.gs-header h3{font-size:13px;font-weight:600;color:#333}
.gs-rate-badge{background:var(--primary);color:#fff;border-radius:20px;padding:2px 10px;font-size:12px;font-weight:700}
.gs-body{background:#fff}
.hive-row{display:flex;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;user-select:none}
.hive-row:last-of-type{border-bottom:none}
.hive-row:hover,.hive-row.expanded{background:#FAFAFA}
.hive-info{flex:1;min-width:0}
.hive-name-b{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hive-bd-txt{font-size:12px;color:var(--gray);margin-top:1px}
.hive-rate-col{text-align:right;flex-shrink:0;margin-left:12px}
.hive-rate-v{font-size:16px;font-weight:800;color:var(--primary)}
.hive-rate-s{font-size:11px;color:var(--gray)}
.expand-icon{margin-left:8px;color:#BDBDBD;font-size:14px;transition:transform .2s;flex-shrink:0}
.hive-row.expanded .expand-icon{transform:rotate(180deg)}
.hive-cats{display:none;padding:10px 14px;background:#F8F9FA;border-bottom:1px solid var(--border)}
.hive-cats.show{display:block}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:6px}
.cc{border-radius:8px;padding:8px 10px;font-size:11px;line-height:1.4;border:1px solid}
.cc.bm{background:var(--success-bg);color:var(--success);border-color:#A5D6A7}
.cc.nobm{background:var(--danger-bg);color:#C62828;border-color:#FFCDD2}
.cc-name{font-size:12px;font-weight:700;margin-bottom:2px}
.cc-detail{opacity:.8}
/* BD View */
.bd-list-wrap{background:var(--card);border-radius:var(--radius);box-shadow:0 1px 4px rgba(0,0,0,.08);overflow:hidden}
.bd-row{display:flex;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;user-select:none}
.bd-row:last-of-type{border-bottom:none}
.bd-row:hover,.bd-row.expanded{background:#FAFAFA}
.bd-av{width:36px;height:36px;border-radius:50%;background:var(--primary-light);color:var(--primary);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0;margin-right:12px}
.bd-info{flex:1;min-width:0}
.bd-name-v{font-size:14px;font-weight:600}
.bd-meta-v{font-size:12px;color:var(--gray);margin-top:1px}
.bd-rate-col{text-align:right;flex-shrink:0}
.bd-rate-v{font-size:16px;font-weight:800;color:var(--primary)}
.bd-hives-wrap{display:none;padding:6px 14px;background:#F8F9FA;border-bottom:1px solid var(--border)}
.bd-hives-wrap.show{display:block}
.bd-hive-item{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #EEEEEE;font-size:13px}
.bd-hive-item:last-child{border-bottom:none}
.bd-hive-name{color:#333;font-weight:500;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:8px}
.bd-hive-rate{color:var(--primary);font-weight:700;flex-shrink:0}
/* Drop Detail (formerly Search) */
.sf-wrap{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.sf-row{display:flex;gap:8px;flex-wrap:wrap}
.sf-sel,.sf-inp{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:#fff;outline:none;transition:border .15s;flex:1;min-width:120px}
.sf-sel:focus,.sf-inp:focus{border-color:var(--primary)}
.search-hint{color:var(--gray);font-size:13px;text-align:center;padding:40px 0}
.sr-info{font-size:13px;color:var(--gray);margin-bottom:8px;padding-left:2px}
.drop-tabs{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.drop-tab{flex:1;min-width:90px;padding:8px 4px;border-radius:8px;font-size:13px;font-weight:700;text-align:center;cursor:pointer;border:2px solid transparent;transition:all .15s;background:#F5F5F5;color:#666}
.drop-tab.active-quality{background:#FFF3E0;color:#E65100;border-color:#E65100}
.drop-tab.active-bm{background:#FFEBEE;color:#C62828;border-color:#C62828}
.drop-tab.active-thick{background:#F3E5F5;color:#6A1B9A;border-color:#6A1B9A}
.spu-card{background:var(--card);border-radius:var(--radius);box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:8px;overflow:hidden;border-left:4px solid var(--border)}
.spu-card.drop-quality{border-left-color:#E65100}
.spu-card.drop-bm{border-left-color:#C62828}
.spu-card.drop-thick{border-left-color:#6A1B9A}
.spu-hd{display:flex;align-items:flex-start;justify-content:space-between;padding:10px 12px 6px}
.spu-name{font-size:13px;font-weight:700;flex:1;margin-right:8px;line-height:1.4}
.spu-badge{flex-shrink:0;font-size:12px;font-weight:700;padding:2px 8px;border-radius:10px}
.spu-badge.drop-quality-tag{background:#FFF3E0;color:#E65100}
.spu-badge.drop-bm-tag{background:#FFEBEE;color:#C62828}
.spu-badge.drop-thick-tag{background:#F3E5F5;color:#6A1B9A}
.spu-meta{padding:0 12px 6px;font-size:12px;color:var(--gray);display:flex;flex-wrap:wrap;gap:3px 14px}
.spu-nums{display:flex;flex-wrap:wrap;gap:6px 14px;padding:6px 12px;background:#FAFAFA}
.sn{display:flex;flex-direction:column;gap:1px}
.sn-lbl{color:var(--gray);font-size:11px}
.sn-val{font-weight:700;color:#333;font-size:13px}
.sn-val.pos{color:var(--success)}
.sn-val.neg{color:var(--danger)}
.spu-flags{display:flex;flex-wrap:wrap;gap:4px;padding:6px 12px 10px}
.sf-flag{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600}
.sf-flag.on{background:var(--success-bg);color:var(--success)}
.sf-flag.off{background:#F5F5F5;color:#BDBDBD}
@media(min-width:640px){
  .desktop-tabs{display:block}
  .bottom-nav{display:none}
  body{padding-bottom:0}
  .page{padding:16px 20px}
  .overview-card{padding:24px 20px}
  .sf-wrap{flex-direction:row;flex-wrap:wrap}
  .sf-row{flex-wrap:nowrap;flex:1}
}
@media(min-width:900px){.page{padding:20px 0}}
</style>
</head>
<body>
<div class="top-header">
  <h1>浦西团队 六月必上菜考核</h1>
  <div class="sub">
    <span id="hdr-date">--</span>
    <span class="exam-day-badge" id="hdr-day">第?天/共24天</span>
  </div>
</div>
<div class="desktop-tabs">
  <div class="dtab-list">
    <div class="dtab-item active" onclick="switchPage('home')">🏠 首页</div>
    <div class="dtab-item" onclick="switchPage('board')">📋 看板</div>
    <div class="dtab-item" onclick="switchPage('search')">📋 掉出明细</div>
  </div>
</div>

<!-- HOME -->
<div id="page-home" class="page active">
  <div class="overview-card">
    <div class="overview-title">整体标杆达标概览</div>
    <div class="overview-main">
      <div class="circle-wrap">
        <canvas id="circleCanvas" width="120" height="120"></canvas>
        <div class="circle-center" style="color:#fff">
          <div class="circle-pct" id="ov-pct">--</div>
          <div class="circle-sub">达标率</div>
        </div>
      </div>
      <div class="overview-stats">
        <div class="stat-row"><span class="stat-label">已达标 SPU</span><span class="stat-value" id="ov-bm">--</span></div>
        <div class="stat-row"><span class="stat-label">总考核 SPU</span><span class="stat-value small" id="ov-total">--</span></div>
        <div class="stat-row"><span class="stat-label">昨日环比</span><span class="stat-delta" id="ov-dod">--</span></div>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-header"><h2>📊 各组达标率对比</h2></div>
    <div class="card-body"><div class="group-list" id="group-bars"></div></div>
  </div>
  <div class="card">
    <div class="card-header"><h2>🎯 距目标差距</h2></div>
    <div class="card-body" id="goal-body"></div>
  </div>
  <div class="card">
    <div class="card-header">
      <h2>📈 历史趋势</h2>
      <div class="trend-toggle">
        <div class="ttab active" id="tt-day" onclick="switchTrend('day')">日维度</div>
        <div class="ttab" id="tt-week" onclick="switchTrend('week')">周维度</div>
      </div>
    </div>
    <div class="card-body"><div class="chart-canvas-wrap"><canvas id="trendCanvas" height="200"></canvas></div></div>
  </div>
</div>

<!-- BOARD -->
<div id="page-board" class="page">
  <!-- 整体趋势卡片 -->
  <div class="card" style="margin-bottom:12px" id="board-trend-card">
    <div class="card-body" style="padding:14px 16px">
      <div style="font-size:13px;font-weight:700;color:#333;margin-bottom:10px">浦西团队 成熟度变化趋势</div>
      <!-- DOD/WOW/MOM 指标行 -->
      <div style="display:flex;gap:0;margin-bottom:12px;background:#f8f9fa;border-radius:8px;overflow:hidden" id="board-trend-stats"></div>
      <!-- 趋势折线图 -->
      <div style="position:relative;height:80px">
        <canvas id="boardTrendCanvas" style="width:100%;height:80px"></canvas>
      </div>
    </div>
  </div>
  <div id="board-grp"></div>
</div>

<!-- SEARCH / DROP DETAIL -->
<div id="page-search" class="page">
  <div class="card">
    <div class="card-body" style="padding:12px">
      <div class="sf-wrap">
        <div class="sf-row">
          <select class="sf-sel" id="sf-grp" onchange="renderDropList()">
            <option value="">全部小组</option>
            <option value="浦西一组联络点">浦西一组</option>
            <option value="浦西二组联络点">浦西二组</option>
            <option value="浦西三组联络点">浦西三组</option>
            <option value="浦西四组联络点">浦西四组</option>
          </select>
          <input class="sf-inp" id="sf-bd" placeholder="BD姓名" oninput="renderDropList()">
          <input class="sf-inp" id="sf-hive" placeholder="蜂窝名" oninput="renderDropList()">
          <button style="padding:8px 14px;border:1px solid var(--border);border-radius:8px;background:#fff;font-size:13px;cursor:pointer;white-space:nowrap" onclick="resetDropFilters()">重置</button>
        </div>
      </div>
      <div class="drop-tabs">
        <div class="drop-tab active-quality" id="dtab-quality" onclick="switchDropTab('quality')">质量掉出 (-)</div>
        <div class="drop-tab" id="dtab-bm" onclick="switchDropTab('bm')">标杆掉出 (-)</div>
        <div class="drop-tab" id="dtab-thick" onclick="switchDropTab('thick')">厚度掉出 (-)</div>
      </div>
    </div>
  </div>
  <div id="search-out"><div class="search-hint">正在加载数据...</div></div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <div class="nav-item active" id="nav-home" onclick="switchPage('home')"><div class="nav-icon">🏠</div><span>首页</span></div>
  <div class="nav-item" id="nav-board" onclick="switchPage('board')"><div class="nav-icon">📋</div><span>看板</span></div>
  <div class="nav-item" id="nav-search" onclick="switchPage('search')"><div class="nav-icon">📋</div><span>掉出明细</span></div>
</div>

// ---- COMPUTED ----
const STATS = (function(){
  const hives = D.hives||{};
  const meta = D.meta||{};
  let oT=0,oB=0;
  const grpS={},hiveS={};
  for(const [hn,hd] of Object.entries(hives)){
    let t=0,b=0;
    for(const [cn,cd] of Object.entries(hd.cat_status||{})){
      for(const g of (cd.goods_detail||[])){t++;if(g.is_bm)b++;}
    }
    hiveS[hn]={total:t,bm:b,group:hd.group,bd:hd.bd,rate:t>0?b/t:0,id:hd.id};
    oT+=t;oB+=b;
    const grp=hd.group;
    if(!grpS[grp])grpS[grp]={total:0,bm:0};
    grpS[grp].total+=t;grpS[grp].bm+=b;
  }
  for(const g of Object.keys(grpS))grpS[g].rate=grpS[g].total>0?grpS[g].bm/grpS[g].total:0;
  return{hiveS,grpS,oT,oB,meta,oRate:oT>0?oB/oT:0};
})();

function drawCircle(rate){
  const canvas=document.getElementById('circleCanvas');
  const ctx=canvas.getContext('2d');
  const cx=60,cy=60,r=50,lw=10;
  ctx.clearRect(0,0,120,120);
  // bg arc
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=lw;ctx.stroke();
  // fill arc
  const start=-Math.PI/2,end=start+Math.PI*2*rate;
  ctx.beginPath();ctx.arc(cx,cy,r,start,end);
  ctx.strokeStyle='#ffffff';ctx.lineWidth=lw;ctx.lineCap='round';ctx.stroke();
}

function drawTrendChart(mode){
  const canvas=document.getElementById('trendCanvas');
  const ctx=canvas.getContext('2d');
  const W=canvas.offsetWidth||canvas.width;
  canvas.width=W;canvas.height=200;
  ctx.clearRect(0,0,W,200);

  if(!HISTORY||HISTORY.length===0){
    ctx.fillStyle='#999';ctx.font='14px sans-serif';ctx.textAlign='center';
    ctx.fillText('暂无历史数据',W/2,100);return;
  }

  // Use HISTORY to get overall_bm_rate by date
  // HISTORY entry: {date, exam_days, hives:{id:{finalScore,dabiaoRate,...}}, overall:{dod,mom}}
  let pts=[];
  if(mode==='day'){
    for(const h of HISTORY){
      // compute overall_bm_rate from hives
      let sumBm=0,cnt=0;
      if(h.hives){for(const hv of Object.values(h.hives)){sumBm+=(hv.dabiaoRate||0);cnt++;}}
      pts.push({label:h.date?h.date.slice(5):h.date,val:cnt>0?sumBm/cnt:0});
    }
  } else {
    // aggregate by week
    const weekMap={};
    for(const h of HISTORY){
      const d=new Date(h.date);const wd=`W${Math.ceil(d.getDate()/7)}`;
      let sumBm=0,cnt=0;
      if(h.hives){for(const hv of Object.values(h.hives)){sumBm+=(hv.dabiaoRate||0);cnt++;}}
      if(!weekMap[wd])weekMap[wd]={sum:0,cnt:0,days:0};
      weekMap[wd].sum+=cnt>0?sumBm/cnt:0;weekMap[wd].days++;
    }
    for(const[wk,v]of Object.entries(weekMap)){pts.push({label:wk,val:v.days>0?v.sum/v.days:0});}
  }
  if(pts.length===0){ctx.fillStyle='#999';ctx.font='14px sans-serif';ctx.textAlign='center';ctx.fillText('暂无数据',W/2,100);return;}

  const pad={t:20,r:20,b:40,l:45};
  const cW=W-pad.l-pad.r,cH=200-pad.t-pad.b;
  const maxV=Math.max(...pts.map(p=>p.val),0.01);
  const minV=0;

  // grid
  ctx.strokeStyle='#E0E0E0';ctx.lineWidth=1;
  for(let i=0;i<=4;i++){
    const y=pad.t+cH*(1-i/4);
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+cW,y);ctx.stroke();
    ctx.fillStyle='#999';ctx.font='10px sans-serif';ctx.textAlign='right';
    ctx.fillText((maxV*i/4*100).toFixed(0)+'%',pad.l-4,y+4);
  }

  // x labels
  const step=cW/(pts.length-1||1);
  ctx.fillStyle='#999';ctx.font='10px sans-serif';ctx.textAlign='center';
  pts.forEach((p,i)=>{
    if(pts.length<=10||i%(Math.ceil(pts.length/8))===0){
      ctx.fillText(p.label,pad.l+i*step,200-pad.b+14);
    }
  });

  // line
  ctx.beginPath();
  pts.forEach((p,i)=>{
    const x=pad.l+i*step;
    const y=pad.t+cH*(1-(p.val-minV)/(maxV-minV||1));
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  });
  ctx.strokeStyle='#1565C0';ctx.lineWidth=2;ctx.stroke();

  // fill
  ctx.lineTo(pad.l+(pts.length-1)*step,pad.t+cH);
  ctx.lineTo(pad.l,pad.t+cH);ctx.closePath();
  ctx.fillStyle='rgba(21,101,192,.08)';ctx.fill();

  // dots
  pts.forEach((p,i)=>{
    const x=pad.l+i*step;
    const y=pad.t+cH*(1-(p.val-minV)/(maxV-minV||1));
    ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);
    ctx.fillStyle='#1565C0';ctx.fill();
  });
}

function renderBoardTrendCard(){
  // DOD/WOW/MOM
  const ov=TREND.overall||{};
  const dod=ov.dod!=null?ov.dod:null;
  const wow=ov.mom!=null?ov.mom:null;
  function statBox(label,val){
    if(val==null)return`<div style="flex:1;padding:10px 0;text-align:center;border-right:1px solid #eee"><div style="font-size:11px;color:#aaa;margin-bottom:3px">${label}</div><div style="font-size:13px;color:#bbb">-</div></div>`;
    const diff=val-100;
    const up=diff>0.4;const dn=diff<-0.4;
    const col=up?'var(--success)':dn?'var(--danger)':'#888';
    const sign=up?'▲':dn?'▼':'';
    return`<div style="flex:1;padding:10px 0;text-align:center;border-right:1px solid #eee"><div style="font-size:11px;color:#aaa;margin-bottom:3px">${label}</div><div style="font-size:14px;font-weight:700;color:${col}">${sign}${diff>=0?'+':''}${diff.toFixed(1)}%</div></div>`;
  }
  const statsEl=document.getElementById('board-trend-stats');
  statsEl.innerHTML=[
    statBox('日 DOD',dod),
    statBox('周 WOW',wow),
    `<div style="flex:1;padding:10px 0;text-align:center"><div style="font-size:11px;color:#aaa;margin-bottom:3px">月 MOM</div><div style="font-size:13px;color:#bbb">-</div></div>`
  ].join('');

  // 趋势折线图（用 HISTORY 数据）
  const canvas=document.getElementById('boardTrendCanvas');
  if(!canvas||!HISTORY||HISTORY.length<2)return;
  const dpr=window.devicePixelRatio||1;
  const W=canvas.parentElement.offsetWidth||300;
  const H=80;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  const vals=HISTORY.map(h=>h.overall_bm_rate||0);
  const mn=Math.min(...vals),mx=Math.max(...vals)||0.01;
  const pad={t:8,b:20,l:8,r:8};
  const cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;
  const pts=vals.map((v,i)=>[pad.l+i/(vals.length-1)*cw, pad.t+ch-(v-mn)/(mx-mn||1)*ch]);
  // 封闭区域渐变色
  const grad=ctx.createLinearGradient(0,pad.t,0,pad.t+ch);
  grad.addColorStop(0,'rgba(21,101,192,0.18)');grad.addColorStop(1,'rgba(21,101,192,0)');
  ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
  pts.slice(1).forEach(p=>ctx.lineTo(p[0],p[1]));
  ctx.lineTo(pts[pts.length-1][0],pad.t+ch);ctx.lineTo(pts[0][0],pad.t+ch);ctx.closePath();
  ctx.fillStyle=grad;ctx.fill();
  // 折线
  ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
  pts.slice(1).forEach(p=>ctx.lineTo(p[0],p[1]));
  ctx.strokeStyle='#1565C0';ctx.lineWidth=2;ctx.stroke();
  // X 轴日期标签
  ctx.fillStyle='#aaa';ctx.font=`${10*dpr/dpr}px sans-serif`;ctx.textAlign='center';
  HISTORY.forEach((h,i)=>{
    const x=pts[i][0];
    ctx.fillText((h.date||'').slice(5),x,H-4);
  });
}
function renderBoardFiltered(){
  const grpF=document.getElementById('bf-grp').value;
  const bdF=document.getElementById('bf-bd').value;
  buildBoardGroup(grpF,bdF);
}

function buildBoardGroup(grpF='',bdF=''){
  const{hiveS,grpS}=STATS;
  const grpMap={};
  for(const[hn,hs]of Object.entries(hiveS)){
    if(bdF&&hs.bd!==bdF)continue;
    if(!grpMap[hs.group])grpMap[hs.group]=[];
    grpMap[hs.group].push({name:hn,...hs});
  }
  const grpOrder=['浦西一组联络点','浦西二组联络点','浦西三组联络点','浦西四组联络点'];
  const activeGroups=grpF?[grpF]:grpOrder;
  const el=document.getElementById('board-grp');
  el.innerHTML='';

  // ---- 各组达成概览卡片（始终可见）----
  const summaryDiv=document.createElement('div');
  summaryDiv.style.cssText='display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px';
  for(const grp of grpOrder){
    if(grpF&&grp!==grpF)continue;
    const gs=grpS[grp]||{bm:0,total:0,rate:0};
    const shortG=grp.replace('联络点','');
    const pctV=Math.round((gs.rate||0)*100);
    const card=document.createElement('div');
    card.style.cssText='background:#fff;border-radius:10px;padding:12px 14px;box-shadow:0 1px 3px rgba(0,0,0,.07);cursor:pointer;border:2px solid transparent;transition:all .15s';
    card.dataset.grp=grp;
    card.onmouseenter=()=>{card.style.boxShadow='0 2px 8px rgba(21,101,192,.15)';card.style.borderColor='#1565C0';}
    card.onmouseleave=()=>{card.style.boxShadow='0 1px 3px rgba(0,0,0,.07)';card.style.borderColor='transparent';}
    const tg=TREND.groups&&TREND.groups[grp]||{};
    const dod=tg.dod!=null?tg.dod:null;
    const wow=tg.mom!=null?tg.mom:null;
    function trendTag(val,label){
      if(val==null)return`<div style="text-align:center"><div style="font-size:10px;color:#bbb">${label}</div><div style="font-size:11px;color:#bbb">-</div></div>`;
      const up=val>=100;const neutral=Math.abs(val-100)<0.5;
      const sign=neutral?'':up?'▲':'▼';
      const col=neutral?'#888':up?'var(--success)':'var(--danger)';
      const diff=neutral?'0':(up?'+'+(val-100).toFixed(1):''+(val-100).toFixed(1))+'%';
      return`<div style="text-align:center"><div style="font-size:10px;color:#bbb">${label}</div><div style="font-size:11px;font-weight:600;color:${col}">${sign}${diff}</div></div>`;
    }
    card.innerHTML=`
      <div style="font-size:12px;color:#888;margin-bottom:4px">${shortG}</div>
      <div style="font-size:20px;font-weight:800;color:${pctV>=50?'var(--success)':'var(--danger)'}">${pctV}%</div>
      <div style="font-size:11px;color:#aaa;margin-top:2px">${gs.bm} / ${gs.total}</div>
      <div style="margin-top:8px;height:3px;background:#f0f0f0;border-radius:2px">
        <div style="height:3px;border-radius:2px;background:${pctV>=50?'var(--success)':'var(--danger)'};width:${Math.min(pctV,100)}%"></div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:10px;padding-top:8px;border-top:1px solid #f5f5f5">
        ${trendTag(dod,'日DOD')}
        ${trendTag(wow,'周WOW')}
        ${trendTag(null,'月MOM')}
      </div>`;
    card.onclick=()=>{
      const existing=document.getElementById('hive-list-'+grp);
      // 关闭其他组
      document.querySelectorAll('[id^="hive-list-"]').forEach(d=>{
        if(d.id!=='hive-list-'+grp)d.remove();
      });
      document.querySelectorAll('[id^="grp-card-"]').forEach(c=>{
        if(c.id!=='grp-card-'+grp){c.style.borderColor='transparent';c.style.boxShadow='0 1px 3px rgba(0,0,0,.07)';}
      });
      if(existing){existing.remove();card.style.borderColor='transparent';card.style.boxShadow='0 1px 3px rgba(0,0,0,.07)';return;}
      // 高亮当前卡片
      card.style.borderColor='#1565C0';card.style.boxShadow='0 2px 8px rgba(21,101,192,.2)';
      // 构建蜂窝列表
      const arr=(grpMap[grp]||[]).slice().sort((a,b)=>b.rate-a.rate);
      const wrap=document.createElement('div');
      wrap.id='hive-list-'+grp;
      wrap.style.cssText='background:#fff;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.07);overflow:hidden;margin-top:0';
      let rows='';
      arr.forEach(h=>{
        const ht=TREND.hives&&TREND.hives[h.id]||{};
        const dod=ht.dod!=null?ht.dod:null;
        const pctV=Math.round((h.rate||0)*100);
        const col=pctV>=50?'var(--success)':'var(--danger)';
        let dodHtml='';
        if(dod==null){dodHtml='<span style="font-size:11px;color:#bbb">DOD -</span>';}
        else{
          const diff=dod-100;
          const up=diff>0.4;const dn=diff<-0.4;
          const sign=up?'▲':dn?'▼':'';
          const c2=up?'var(--success)':dn?'var(--danger)':'#888';
          dodHtml=`<span style="font-size:11px;font-weight:600;color:${c2}">DOD ${sign}${diff>=0?'+':''}${diff.toFixed(1)}%</span>`;
        }
        rows+=`<div style="display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid #f5f5f5;gap:8px">
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${h.name}</div>
            <div style="font-size:11px;color:#999;margin-top:1px">BD: ${h.bd||'-'}</div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-size:14px;font-weight:700;color:${col}">${pctV}%</div>
            <div style="margin-top:2px">${dodHtml}</div>
          </div>
        </div>`;
      });
      wrap.innerHTML=rows||'<div style="padding:14px;color:#999;font-size:13px">暂无蜂窝数据</div>';
      el.appendChild(wrap);
    };
    card.id='grp-card-'+grp;
    summaryDiv.appendChild(card);
  }
  el.appendChild(summaryDiv);

}



// ---- DROP DETAIL (formerly Search) ----
let searchInited=false;
let SEARCH_DATA_LOADED=false;
let SEARCH_DATA_LOADING=false;
let currentDropTab='quality'; // 'quality' | 'bm' | 'thick'

function loadSearchData(callback){
  if(SEARCH_DATA_LOADED){callback();return;}
  if(SEARCH_DATA_LOADING){setTimeout(()=>loadSearchData(callback),100);return;}
  SEARCH_DATA_LOADING=true;
  fetch('search_data.json')
    .then(r=>r.json())
    .then(data=>{
      SEARCH_DATA=data;
      SEARCH_DATA_LOADED=true;
      SEARCH_DATA_LOADING=false;
      callback();
    })
    .catch(()=>{
      SEARCH_DATA_LOADING=false;
      const out=document.getElementById('search-out');
      if(out)out.innerHTML='<div class="search-hint">数据加载失败，请刷新重试</div>';
    });
}

function initSearchPage(){
  if(!searchInited){
    searchInited=true;
    const out=document.getElementById('search-out');
    if(out)out.innerHTML='<div class="search-hint">正在加载数据...</div>';
    loadSearchData(()=>{
      updateDropTabCounts();
      renderDropList();
    });
  }
}

function updateDropTabCounts(){
  if(!SEARCH_DATA_LOADED)return;
  const qCount=SEARCH_DATA.filter(s=>s.quality_drop===1).length;
  const bCount=SEARCH_DATA.filter(s=>s.bm_drop===1).length;
  const tCount=SEARCH_DATA.filter(s=>s.thick_drop===1).length;
  const tq=document.getElementById('dtab-quality');
  const tb=document.getElementById('dtab-bm');
  const tt=document.getElementById('dtab-thick');
  if(tq)tq.textContent=`质量掉出 (${qCount})`;
  if(tb)tb.textContent=`标杆掉出 (${bCount})`;
  if(tt)tt.textContent=`厚度掉出 (${tCount})`;
}

function switchDropTab(tab){
  currentDropTab=tab;
  ['quality','bm','thick'].forEach(t=>{
    const el=document.getElementById('dtab-'+t);
    if(!el)return;
    el.classList.remove('active-quality','active-bm','active-thick');
    if(t===tab)el.classList.add('active-'+tab);
  });
  renderDropList();
}

function resetDropFilters(){
  document.getElementById('sf-grp').value='';
  document.getElementById('sf-bd').value='';
  document.getElementById('sf-hive').value='';
  renderDropList();
}

function renderDropList(){
  const out=document.getElementById('search-out');
  if(!SEARCH_DATA_LOADED){
    loadSearchData(()=>{updateDropTabCounts();renderDropList();});
    return;
  }
  const grp=document.getElementById('sf-grp').value;
  const bd=document.getElementById('sf-bd').value.trim().toLowerCase();
  const hive=document.getElementById('sf-hive').value.trim().toLowerCase();

  const dropKey=currentDropTab==='quality'?'quality_drop':currentDropTab==='bm'?'bm_drop':'thick_drop';
  const dropClass='drop-'+currentDropTab;
  const tagClass='drop-'+currentDropTab+'-tag';
  const tagText=currentDropTab==='quality'?'质量掉出':currentDropTab==='bm'?'标杆掉出':'厚度掉出';

  const results=SEARCH_DATA.filter(s=>{
    if(s[dropKey]!==1)return false;
    if(grp&&s.group!==grp)return false;
    if(bd&&!(s.bd_name||'').toLowerCase().includes(bd))return false;
    if(hive&&!(s.hive_name||'').toLowerCase().includes(hive))return false;
    return true;
  });

  if(results.length===0){
    out.innerHTML='<div class="search-hint">该条件下暂无掉出商品 🎉</div>';
    return;
  }

  let html=`<div class="sr-info">${tagText}：${results.length} 条</div>`;
  for(const s of results){
    html+=`<div class="spu-card ${dropClass}">
      <div class="spu-hd">
        <div class="spu-name">${s.spu_name||'-'}</div>
        <div class="spu-badge ${tagClass}">${tagText}</div>
      </div>
      <div class="spu-meta">
        <span>蜂窝：${s.hive_name||'-'}</span>
        <span>品类：${s.cat||'-'}</span>
        <span>BD：${s.bd_name||'-'}</span>
      </div>
      <div class="spu-nums">
        <div class="sn"><span class="sn-lbl">商品分</span><span class="sn-val">${(s.score||0).toFixed(1)}</span></div>
        <div class="sn"><span class="sn-lbl">日均</span><span class="sn-val">${(s.daily||0).toFixed(1)}</span></div>
        <div class="sn"><span class="sn-lbl">阈值</span><span class="sn-val">${(s.threshold||0).toFixed(1)}</span></div>
      </div>
      <div class="spu-flags">
        <span class="sf-flag ${s.liang_chu?'on':'off'}">亮厨${s.liang_chu?'✅':'❌'}</span>
        <span class="sf-flag ${s.ad?'on':'off'}">广告${s.ad?'✅':'❌'}</span>
        <span class="sf-flag ${s.pin_dan_bao?'on':'off'}">拼单宝${s.pin_dan_bao?'✅':'❌'}</span>
        <span class="sf-flag ${s.zi_qu?'on':'off'}">自取${s.zi_qu?'✅':'❌'}</span>
      </div>
    </div>`;
  }
  out.innerHTML=html;
}
